{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>筛选知识点（线上资源库）</h2>
    <p class="muted">当前页面沿用原来的学习界面，但知识点、讲解资源和在线练习来自线上资源库，不再依赖线下手动录入。</p>
    <div class="row">
        <div class="col">
            <label>国家</label>
            <select id="country">
                <option value="">请选择国家</option>
                {% for c in countries %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
            </select>
        </div>
        <div class="col">
            <label>省份 / 地区</label>
            <select id="province">
                <option value="">请选择省份 / 地区</option>
                {% for p in provinces %}<option value="{{ p }}">{{ p }}</option>{% endfor %}
            </select>
        </div>
        <div class="col">
            <label>年级</label>
            <select id="grade">
                <option value="">请选择年级</option>
                {% for g in grades %}<option value="{{ g }}">{{ g }}</option>{% endfor %}
            </select>
        </div>
    </div>
    <div class="row">
        <div class="col">
            <label>学科</label>
            <div>
                {% for s in subjects %}
                    <label><input type="radio" name="subject" value="{{ s }}"> {{ s }}</label>
                {% endfor %}
            </div>
        </div>
        <div class="col" style="display:flex;align-items:flex-end;">
            <button onclick="loadTopics()">查询知识点</button>
        </div>
    </div>
</div>

<div class="card">
    <h2>知识点列表</h2>
    <table>
        <thead>
            <tr>
                <th>知识点</th>
                <th>要求</th>
                <th>详细讲解</th>
                <th>线上资源</th>
                <th>在线做题</th>
            </tr>
        </thead>
        <tbody id="topicTableBody">
            <tr><td colspan="5" class="muted">请先筛选条件并点击查询。</td></tr>
        </tbody>
    </table>
</div>

<div id="detailArea" class="card" style="display:none;">
    <h2 id="detailTitle">详情</h2>
    <div id="detailContent"></div>
</div>

<script>
let currentTopics = [];

function getSelectedSubject() {
    const selected = document.querySelector('input[name="subject"]:checked');
    return selected ? selected.value : '';
}

async function loadTopics() {
    const params = new URLSearchParams({
        country: document.getElementById('country').value,
        province: document.getElementById('province').value,
        grade: document.getElementById('grade').value,
        subject: getSelectedSubject()
    });

    const res = await fetch(`/api/topics?${params.toString()}`);
    const data = await res.json();
    currentTopics = data;
    const body = document.getElementById('topicTableBody');

    if (!data.length) {
        body.innerHTML = '<tr><td colspan="5">没有找到符合条件的线上知识点。</td></tr>';
        return;
    }

    body.innerHTML = data.map(t => `
        <tr>
            <td>${t.knowledge_point}</td>
            <td><button class="small-btn" onclick="showRequirement(${t.id})">要求</button></td>
            <td><button class="small-btn" onclick="showExplanation(${t.id})">详细讲解</button></td>
            <td><button class="small-btn" onclick="showResources(${t.id})">线上资源</button></td>
            <td><button class="small-btn" onclick="showQuizOptions(${t.id}, '${t.knowledge_point.replace(/'/g, "&#39;")}')">在线做题</button></td>
        </tr>
    `).join('');
}

function openDetail(title, html) {
    document.getElementById('detailArea').style.display = 'block';
    document.getElementById('detailTitle').innerText = title;
    document.getElementById('detailContent').innerHTML = html;
}

function findTopic(topicId) {
    return currentTopics.find(t => t.id === topicId);
}

function showRequirement(topicId) {
    const t = findTopic(topicId);
    openDetail('大纲要求', `<pre>${t.requirement}</pre>`);
}

function showExplanation(topicId) {
    const t = findTopic(topicId);
    openDetail('详细讲解', `<pre>${t.explanation}</pre>`);
}

async function showResources(topicId) {
    const res = await fetch(`/api/topic/${topicId}/resources`);
    const data = await res.json();
    const links = (data.resource_links || []).map(item => `
        <div class="modal">
            <strong>${item.title}</strong>
            <p class="muted">类型：${item.type || 'resource'}</p>
            <a href="${item.url}" target="_blank" rel="noopener">打开资源</a>
        </div>
    `).join('');

    openDetail(`线上资源 - ${data.knowledge_point}`, `
        <p><strong>资源来源：</strong>${data.remote_source || 'Online Library'}</p>
        <pre>${data.explanation}</pre>
        ${links || '<p>当前没有资源链接。</p>'}
    `);
}

function showQuizOptions(topicId, topicName) {
    openDetail(`在线做题设置 - ${topicName}`, `
        <div class="modal">
            <form method="post" action="/topic/${topicId}/quiz/start">
                <label>题目数量</label>
                <select name="amount">
                    <option value="5">5</option>
                    <option value="10">10</option>
                </select>

                <label>难度</label>
                <select name="difficulty">
                    <option value="">任意</option>
                    <option value="easy">简单</option>
                    <option value="medium">中等</option>
                    <option value="hard">困难</option>
                </select>

                <label>题型</label>
                <select name="qtype">
                    <option value="">任意</option>
                    <option value="multiple">选择题</option>
                    <option value="boolean">判断题</option>
                </select>

                <button type="submit">开始在线练习</button>
            </form>
        </div>
    `);
}
</script>
{% endblock %}
