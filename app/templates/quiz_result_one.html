<!DOCTYPE html><html lang='zh'><head><meta charset='UTF-8'><title>结果</title><style>
body{margin:0;font-family:Arial,sans-serif;background:#eef2f7;color:#1f2937}
nav{background:#184a78;color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
nav a{color:#fff;text-decoration:none;margin-left:16px;font-weight:600}
.container{max-width:1180px;margin:24px auto;padding:0 12px}
.card{background:#fff;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);padding:20px;margin-bottom:18px}
.grid3{display:grid;grid-template-columns:2fr 2fr 1.2fr;gap:12px}
.grid4{display:grid;grid-template-columns:1.3fr 1.3fr 0.8fr 1fr;gap:12px}
select,button,input,textarea{padding:10px 12px;border-radius:10px;border:1px solid #cbd5e1;font-size:14px;box-sizing:border-box}
button{background:#1f5c93;color:#fff;border:none;cursor:pointer}
button.secondary{background:#eef6ff;color:#1f5c93;border:1px solid #bfd4ea}
table{width:100%;border-collapse:collapse}
th,td{padding:12px 8px;border-bottom:1px solid #e5e7eb;vertical-align:top;text-align:left}
th{background:#f8fafc}
.panel{background:#f8fbff;border:1px solid #d9e5f3;border-radius:12px;padding:14px;line-height:1.7;white-space:pre-wrap}
.small{color:#64748b;font-size:13px}
.req-item{margin:6px 0}
.msg{margin:10px 0;padding:10px;background:#f5f8ff;border-radius:10px}
.pill{display:inline-block;background:#eef6ff;color:#1f5c93;border:1px solid #cfe2f5;padding:4px 10px;border-radius:999px;font-size:12px}
.hero{display:flex;justify-content:space-between;align-items:center;gap:16px}
.wrap{max-width:430px;margin:70px auto;background:white;padding:24px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.answer{display:block;margin:10px 0;padding:12px;border:1px solid #dbe4ef;border-radius:12px;background:#fff}
.ok{color:#15803d;font-weight:700}.bad{color:#b91c1c;font-weight:700}
</style></head><body><nav><div><strong>Study Platform</strong></div><div><a href='/dashboard'>主页</a><a href='/history'>做题记录</a><a href='/photo-upload'>拍照识题</a><a href='/logout'>退出</a></div></nav><div class='container'><div class='card'><h2 style='margin-top:0'>答题结果</h2><p><strong>单元：</strong>{{ q.unit }}</p><p><strong>你的答案：</strong>{{ user_answer }}</p><p><strong>正确答案：</strong>{{ q.correct_answer }}</p><p><strong>得分：</strong>{{ score }} / {{ max_score }}</p>{% if is_correct %}<div class='ok'>✅ 正确</div>{% else %}<div class='bad'>❌ 错误</div>{% endif %}</div><div class='card'><h3 style='margin-top:0'>讲解</h3><div class='panel'>{{ q.explanation }}</div>{% if feedback_extra %}<h3>评分反馈</h3><div class='panel'>{{ feedback_extra }}</div>{% endif %}</div><div class='card'><form method='get' action='/quiz/next' style='display:inline-block'><input type='hidden' name='country' value='{{ next_info.country }}'><input type='hidden' name='province' value='{{ next_info.province }}'><input type='hidden' name='grade' value='{{ next_info.grade }}'><input type='hidden' name='subject' value='{{ next_info.subject }}'><input type='hidden' name='qtype' value='{{ next_info.qtype }}'><button type='submit'>直接做下一题（同科目同类型）</button></form> <a href='/dashboard'><button type='button' class='secondary'>返回主页</button></a> <a href='/history'><button type='button' class='secondary'>查看做题记录</button></a></div></div></body></html>
